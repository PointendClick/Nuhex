<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title></title>
    <style>
                body {
                        font-family: Arial, sans-serif;
                        background-color: #1a1d29;
                        color: #ffffff;
                        margin: 0;
                        padding: 15px;
                        height: 100vh;
                        box-sizing: border-box;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        overflow: hidden;
                }
                .container {
                        width: 100%;
                        max-width: 750px;
                        height: auto;
                        display: flex;
                        flex-direction: column;
                        gap: 15px;
                }
                .output-screen {
                        background: #141519;
                        border: 4px solid #1f2833;
                        border-radius: 16px;
                        min-height: 360px;
                        padding: 25px;
                        display: flex;
                        flex-wrap: wrap;
                        gap: 25px;
                        justify-content: center;
                        align-items: center;
                        box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
                }
                .hyperglyph-matrix {
                        display: grid;
                        grid-template-columns: repeat(4, 1fr);
                        grid-template-rows: repeat(4, 1fr);
                        width: 220px;
                        height: 220px;
                        background: #1f2833; 
                        border: 1px solid #1f2833;
                        gap: 5px;
                        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
                }
                .matrix4-cell {
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        font-family: 'Courier New', Courier, monospace;
                        font-weight: 900;
                        font-size: 26px;
                        box-sizing: border-box;
                        user-select: none;
                        border-style: solid;
                        border-width: 8px;
                }
                .input-screen {
                        background: #f5f6f8;
                        border: 3px solid #45a29e;
                        border-radius: 12px;
                        padding: 20px;
                        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
                }
                textarea {
                        width: 100%;
                        height: 80px;
                        border: none;
                        color: #000000;
                        background: transparent;
                        font-family: 'Courier New', Courier, monospace;
                        font-size: 26px;
                        font-weight: bold;
                        box-sizing: border-box;
                        resize: none;
                        outline: none;
                        caret-color: #000000;
                }
        </style>
</head>
<body>

<div class="container">
        <div>
                <div id="glyphOutput" class="output-screen"></div>
        </div>
        <div>
                <div class="input-screen">
                        <textarea id="textInput" autofocus></textarea>
                </div>
        </div>
</div>

<script>
    const textInput = document.getElementById('textInput');
    const glyphOutput = document.getElementById('glyphOutput');

    const hexColors = [
        '#dbb1b8', '#00ffff', '#808080', '#ff00ff',
        '#469696', '#ffff00', '#00ff00', '#800080',
        '#0000ff', '#ff0000', '#ffffff', '#000000',
        '#ff9900', '#674ea7', '#7f6000', '#056c30'
    ];

    const alphabet = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    
    function getCharIndex(char) {
        return alphabet.indexOf(char);
    }

    function makeMatrixFrame() {
        const matrix = document.createElement('div');
        matrix.className = 'hyperglyph-matrix';
        return matrix;
    }

    textInput.addEventListener('input', () => {
        const val = textInput.value;
        if (!val) {
            glyphOutput.innerHTML = "";
            return;
        }

        let cellStream = [];
        let ptr = 0;

        while (ptr < val.length) {
            let char1 = val[ptr];

            if (char1 === ' ') {
                cellStream.push({ border: '#ffffff', bg: '#ffffff', fontColor: 'transparent', display: '' });
                ptr += 1;
                continue;
            }
            if (char1 === '.') {
                cellStream.push({ border: '#000000', bg: '#000000', fontColor: 'transparent', display: '' });
                ptr += 1;
                continue;
            }

            let idx1 = getCharIndex(char1);
            if (idx1 === -1) {
                ptr += 1;
                continue;
            }

            if (ptr + 1 < val.length) {
                let char2 = val[ptr + 1];

                if (char2 === ' ' || char2 === '.') {
                    let borderIdx = idx1 % 16;
                    cellStream.push({
                        border: hexColors[borderIdx],
                        bg: '#141519',
                        fontColor: hexColors[(borderIdx + 4) % 16],
                        display: char1
                    });
                    ptr += 1;
                } else {
                    let idx2 = getCharIndex(char2);
                    if (idx2 === -1) {
                        ptr += 1;
                        continue;
                    }

                    let bdrIdx = idx1 % 16;
                    let bgIdx  = (idx1 + 5) % 16;
                    let fontIdx = (idx2 + 10) % 16;

                    cellStream.push({
                        border: hexColors[bdrIdx],
                        bg: hexColors[bgIdx],
                        fontColor: hexColors[fontIdx],
                        display: char2
                    });
                    ptr += 2;
                }
            } else {
                let borderIdx = idx1 % 16;
                cellStream.push({
                    border: hexColors[borderIdx],
                    bg: '#141519',
                    fontColor: hexColors[(borderIdx + 4) % 16],
                    display: char1
                });
                ptr += 1;
            }
        }

        let blocks = [];
        let currentBlock = [];
        cellStream.forEach(cell => {
            currentBlock.push(cell);
            if (currentBlock.length === 16) {
                blocks.push(currentBlock);
                currentBlock = [];
            }
        });

        if (currentBlock.length > 0) {
            while (currentBlock.length < 16) {
                let fillIdx = currentBlock.length;
                currentBlock.push({
                    border: 'transparent',
                    bg: hexColors[fillIdx],
                    fontColor: 'transparent',
                    display: ''
                });
            }
            blocks.push(currentBlock);
        }

        glyphOutput.innerHTML = "";
        blocks.forEach(blockData => {
            const matrixGrid = makeMatrixFrame();
            for (let i = 0; i < 16; i++) {
                const data = blockData[i];
                const cell = document.createElement('div');
                cell.className = 'matrix4-cell';
                cell.style.borderColor = data.border;
                cell.style.backgroundColor = data.bg;
                cell.style.color = data.fontColor;
                cell.innerText = data.display;
        
                matrixGrid.appendChild(cell);
            }
            glyphOutput.appendChild(matrixGrid);
        });
    });
</script>
</body>
</html>
