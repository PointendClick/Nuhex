
<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title></title>
    <style>
                body {
                        font-family: Arial, sans-serif;
                        background-color: #1a1d29;
                        color: #ffffff;
                        margin: 0;
                        padding: 15px;
                        height: 100vh;
                        box-sizing: border-box;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        overflow: hidden;
                }
                .container {
                        width: 100%;
                        max-width: 750px;
                        height: auto;
                        display: flex;
                        flex-direction: column;
                        gap: 15px;
                }
                .output-screen {
                        background: #141519;
                        border: 4px solid #1f2833;
                        border-radius: 16px;
                        min-height: 360px;
                        padding: 25px;
                        display: flex;
                        flex-wrap: wrap;
                        gap: 25px;
                        justify-content: center;
                        align-items: center;
                        box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
                }
                .hyperglyph-matrix {
                        display: grid;
                        grid-template-columns: repeat(4, 1fr);
                        grid-template-rows: repeat(4, 1fr);
                        width: 160px;
                        height: 160px;
                        background: #1f2833; 
                        border: 1px solid #1f2833;
                        gap: 2px;
                        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
                }
                .matrix3-cell {
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        font-family: 'Courier New', Courier, monospace;
                        font-weight: 900;
                        font-size: 20px;
                        letter-spacing: 1px;
            box-sizing: border-box;
                        user-select: none;
        }
                .matrix3-cell span {
            display: inline-block;
        }
        .input-screen {
                        background: #f5f6f8;
                        border: 3px solid #45a29e;
                        border-radius: 12px;
                        padding: 20px;
                        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
                }
                textarea {
                        width: 100%;
                        height: 80px;
                        border: none;
                        color: #000000;
                        background: transparent;
                        font-family: 'Courier New', Courier, monospace;
                        font-size: 26px;
                        font-weight: bold;
                        box-sizing: border-box;
                        resize: none;
                        outline: none;
                        caret-color: #000000;
                }
        </style>
</head>
<body>

<div class="container">
        <div>
                <div id="glyphOutput" class="output-screen"></div>
        </div>
        <div>
                <div class="input-screen">
                        <textarea id="textInput" autofocus></textarea>
                </div>
        </div>
</div>

<script>
        const textInput = document.getElementById('textInput');
        const glyphOutput = document.getElementById('glyphOutput');

    const colorMatrix = [
        ['#dbb1b8', '#00ffff', '#808080', '#ff00ff'], 
        ['#469696', '#ffff00', '#00ff00', '#800080'], 
        ['#0000ff', '#ff0000', '#ffffff', '#000000'], 
        ['#ff9900', '#674ea7', '#7f6000', '#056c30']  
    ];

    // Fixed the redundant gray: index 6 changed from '#808080' to '#00ff00' as shown in your layout picture
    const flatRegistry = [
        '#dbb1b8', '#00ffff', '#808080', '#ff00ff',
        '#469696', '#ffff00', '#00ff00', '#800080',
        '#0000ff', '#ff0000', '#ffffff', '#000000',
        '#ff9900', '#674ea7', '#7f6000', '#056c30'
    ];

    const charProfiles = {
        'a': { row: 0, display: '0' }, 'b': { row: 0, display: '1' }, 'c': { row: 0, display: '2' }, 'd': { row: 0, display: '3' }, 
        'e': { row: 0, display: '4' }, 'f': { row: 0, display: '5' }, 'g': { row: 0, display: '6' }, 'h': { row: 0, display: '7' }, 
        'i': { row: 0, display: '8' }, 'j': { row: 0, display: '9' }, 'k': { row: 0, display: 'A' }, 'l': { row: 0, display: 'B' }, 
        'm': { row: 0, display: 'C' }, 'n': { row: 0, display: 'D' },

        'o': { row: 1, display: '0' }, 'p': { row: 1, display: '1' }, 'q': { row: 1, display: '2' }, 'r': { row: 1, display: '3' }, 
        's': { row: 1, display: '4' }, 't': { row: 1, display: '5' }, 'u': { row: 1, display: '6' }, 'v': { row: 1, display: '7' }, 
        'w': { row: 1, display: '8' }, 'x': { row: 1, display: '9' }, 'y': { row: 1, display: 'A' }, 'z': { row: 1, display: 'B' },

        'A': { row: 2, display: '0' }, 'B': { row: 2, display: '1' }, 'C': { row: 2, display: '2' }, 'D': { row: 2, display: '3' }, 
        'E': { row: 2, display: '4' }, 'F': { row: 2, display: '5' }, 'G': { row: 2, display: '6' }, 'H': { row: 2, display: '7' }, 
        'I': { row: 2, display: '8' }, 'J': { row: 2, display: '9' }, 'K': { row: 2, display: 'A' }, 'L': { row: 2, display: 'B' }, 
        'M': { row: 2, display: 'C' }, 'N': { row: 2, display: 'D' },

        'O': { row: 3, display: '0' }, 'P': { row: 3, display: '1' }, 'Q': { row: 3, display: '2' }, 'R': { row: 3, display: '3' }, 
        'S': { row: 3, display: '4' }, 'T': { row: 3, display: '5' }, 'U': { row: 3, display: '6' }, 'V': { row: 3, display: '7' }, 
        'W': { row: 3, display: '8' }, 'X': { row: 3, display: '9' }, 'Y': { row: 3, display: 'A' }, 'Z': { row: 3, display: 'B' }
    };

    // Reverted back to original base Huffman tokens only (th, er, in, nd, ion, com, res)
    const huffmanTokens = {
        'th':  { display1: '4', row: 0 }, 
        'er':  { display1: '0', row: 0 }, 
        'in':  { display1: '5', row: 1 }, 
        'nd':  { display1: '0', row: 1 }, 
        'ion': { display1: '5', row: 1 }, 
        'com': { display1: '0', row: 1 }, 
        'res': { display1: '0', row: 0 }  
    };

    function makeMatrixFrame() {
                const matrix = document.createElement('div');
                matrix.className = 'hyperglyph-matrix';
                return matrix;
        }

    textInput.addEventListener('input', () => {
                const val = textInput.value;
                if (!val) {
                        glyphOutput.innerHTML = "";
                        return;
                }

        let segments = [];
                let ptr = 0;

        while (ptr < val.length) {
                        if (val.substr(ptr, 3) === ' I ') {
                                segments.push({ type: 'macro-I', raw: ' I ' });
                                ptr += 3;
                                continue;
                        }

            let t3 = val.substr(ptr, 3);
            let t2 = val.substr(ptr, 2);

            if (huffmanTokens[t3] !== undefined) {
                                segments.push({ type: 'huffman', raw: t3, data: huffmanTokens[t3] });
                                ptr += 3;
                        } else if (huffmanTokens[t2] !== undefined) {
                                segments.push({ type: 'huffman', raw: t2, data: huffmanTokens[t2] });
                                ptr += 2;
                        } else {
                                segments.push({ type: 'standard', raw: val[ptr] });
                                ptr += 1;
                        }
                }

        let cellStream = [];
        let sPtr = 0;

        while (sPtr < segments.length) {
            let seg1 = segments[sPtr];
            let seg2 = segments[sPtr + 1];

            if (seg1.type === 'macro-I') {
                cellStream.push({ type: 'raw', bg: colorMatrix[2][3], f1: '#ffffff', f2: 'transparent', d1: 'I', d2: '' });
                sPtr += 1;
                continue;
            }
            if (seg1.raw === ' ') {
                cellStream.push({ type: 'raw', bg: colorMatrix[2][2], f1: 'transparent', f2: 'transparent', d1: '', d2: '' });
                sPtr += 1;
                continue;
            }
            if (seg1.raw === '.') {
                cellStream.push({ type: 'raw', bg: colorMatrix[2][3], f1: 'transparent', f2: 'transparent', d1: '', d2: '' });
                sPtr += 1;
                continue;
            }

            if (seg2 && (seg2.type === 'macro-I' || seg2.raw === ' ' || seg2.raw === '.')) {
                seg2 = null; 
            }

            if (seg1 && seg2) {
                let p1 = (seg1.type === 'huffman') ? { row: seg1.data.row, display: seg1.data.display1 } : (charProfiles[seg1.raw] || { row: 2, display: seg1.raw });
                let p2 = (seg2.type === 'huffman') ? { row: seg2.data.row, display: seg2.data.display1 } : (charProfiles[seg2.raw] || { row: 2, display: seg2.raw });

                let bg = colorMatrix[p1.row][0];      
                let f1Color = colorMatrix[p2.row][1]; 
                let f2Color = colorMatrix[p2.row][2]; 

                cellStream.push({
                    type: 'dual',
                    bg: bg,
                    f1: f1Color,
                    f2: f2Color,
                    d1: p1.display,
                    d2: p2.display
                });
                sPtr += 2; 
            } else {
                let p1 = (seg1.type === 'huffman') ? { row: seg1.data.row, display: seg1.data.display1 } : (charProfiles[seg1.raw] || { row: 2, display: seg1.raw });
                                
                cellStream.push({
                    type: 'dual',
                    bg: colorMatrix[p1.row][0],
                    f1: colorMatrix[p1.row][1],
                    f2: 'transparent',
                    d1: p1.display,
                    d2: ''
                });
                sPtr += 1;
            }
        }

        let blocks = [];
                let currentBlock = [];
                cellStream.forEach(cell => {
                        currentBlock.push(cell);
                        if (currentBlock.length === 16) {
                                blocks.push(currentBlock);
                                currentBlock = [];
                        }
                });
        
        if (currentBlock.length > 0) {
                        while (currentBlock.length < 16) {
                                let fillIdx = currentBlock.length;
                                currentBlock.push({
                                        type: 'raw',
                    bg: flatRegistry[fillIdx],
                                        f1: 'transparent',
                                        f2: 'transparent',
                                        d1: '',
                    d2: ''
                                });
                        }
                        blocks.push(currentBlock);
                }
        
        glyphOutput.innerHTML = "";
                blocks.forEach(blockData => {
                        const matrixGrid = makeMatrixFrame();
                        for (let i = 0; i < 16; i++) {
                                const data = blockData[i];
                                const cell = document.createElement('div');
                                cell.className = 'matrix3-cell';
                                cell.style.backgroundColor = data.bg;
                                                
                const el1 = document.createElement('span');
                el1.style.color = data.f1;
                el1.innerText = data.d1;

                const el2 = document.createElement('span');
                el2.style.color = data.f2;
                el2.innerText = data.d2;
                                
                cell.appendChild(el1);
                cell.appendChild(el2);
                matrixGrid.appendChild(cell);
                        }
                        glyphOutput.appendChild(matrixGrid);
                });
        });
</script>
</body>
</html>
